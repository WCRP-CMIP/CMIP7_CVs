name: 'Add/Modify: Experiment'
description: 'Type: experiment'
title: 'Add/Modify: Experiment: <enter item name>'
labels:
- delta
- experiment
body:
-   type: markdown
    attributes:
        value: " To add a new experiment please fill in the form below. \n\n Existing\
            \ entries are: \n\n\t  | 1pctco2 | 1pctco2-bgc | 1pctco2-rad | abrupt-0p5co2\
            \ | abrupt-2xco2 | abrupt-4xco2 | amip | amip-p4k | amip-piforcing | esm-flat10-cdr\
            \ | esm-flat10-zec | esm-hist | esm-picontrol | g7-15k-sai | high-scenario\
            \ | hist-aer | hist-ghg | hist-nat | hist-piaer | hist-pislcf | historical\
            \ | initialised-prediction-2025-2036 | land-hist | ligabrupt | low-overshoot-scenario\
            \ | low-scenario | medium-scenario-and-extension | piclim-4xco2 | piclim-aer\
            \ | piclim-anthro | piclim-ch4 | piclim-control | piclim-hc | piclim-histaer\
            \ | piclim-histall | piclim-n2o | piclim-nox | piclim-so2 | piclim-voc\
            \ | picontrol | sspx-slcf | very-low-scenario |  \n ___ \n Alternatively\
            \ [see here](https://github.com/wcrp-cmip/CMIP7_CVs/tree/main/data_descriptors/experiment/)\
            \ for more examples. \n  ___"
-   id: activity
    attributes:
        label: Activity
        description: Enter the activity
        options:
        - aerchemmip
        - c4mip
        - cfmip
        - cmip
        - damip
        - dcpp
        - geomip
        - lesfmip
        - lmip
        - pmip
        - ramip
        - rfmip
        - scenariomip
        - tipmip
    validations:
        required: true
    type: dropdown
-   id: description
    attributes:
        label: Description
        description: Detailed description of the experiment
    validations:
        required: true
    type: input
-   id: model_realms
    attributes:
        label: Model Realms
        description: Enter the model realms
        options:
        - aerosol
        - atmos
        - atmoschem
        - land
        - landice
        - ocean
        - ocnbgchem
        - seaice
    validations:
        required: true
    type: dropdown
-   id: name
    attributes:
        label: Name
        description: Human-readable name of the experiment
    validations:
        required: true
    type: input
-   id: parameters
    attributes:
        label: Parameters
        description: Additional parameters for the experiment
    validations:
        required: true
    type: input
-   id: parent_activity
    attributes:
        label: Parent Activity
        description: Enter the parent activity
        options:
        - aerchemmip
        - c4mip
        - cfmip
        - cmip
        - damip
        - dcpp
        - geomip
        - lesfmip
        - lmip
        - pmip
        - ramip
        - rfmip
        - scenariomip
        - tipmip
    validations:
        required: true
    type: dropdown
-   id: parent_experiment
    attributes:
        label: Parent Experiment
        description: Enter the parent experiment
        options:
        - 1pctco2
        - 1pctco2-bgc
        - 1pctco2-rad
        - abrupt-0p5co2
        - abrupt-2xco2
        - abrupt-4xco2
        - amip
        - amip-p4k
        - amip-piforcing
        - esm-flat10-cdr
        - esm-flat10-zec
        - esm-hist
        - esm-picontrol
        - g7-15k-sai
        - high-scenario
        - hist-aer
        - hist-ghg
        - hist-nat
        - hist-piaer
        - hist-pislcf
        - historical
        - initialised-prediction-2025-2036
        - land-hist
        - ligabrupt
        - low-overshoot-scenario
        - low-scenario
        - medium-scenario-and-extension
        - piclim-4xco2
        - piclim-aer
        - piclim-anthro
        - piclim-ch4
        - piclim-control
        - piclim-hc
        - piclim-histaer
        - piclim-histall
        - piclim-n2o
        - piclim-nox
        - piclim-so2
        - piclim-voc
        - picontrol
        - sspx-slcf
        - very-low-scenario
    validations:
        required: true
    type: dropdown
-   id: sub_experiment
    attributes:
        label: Sub Experiment
        description: 'A reference object from <a href=https://wcrp-cmip.github.io/CMIP7_CVs/sub_experiment/>
            https://wcrp-cmip.github.io/CMIP7_CVs/sub_experiment/ </a>. '
    validations:
        required: true
    type: input
